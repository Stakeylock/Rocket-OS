name: Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install -r requirements.txt

    - name: Run smoke tests
      run: |
        pytest test_subsystems_smoke.py test_mission_smoke.py -v --tb=short

    - name: Run main demo (basic check)
      run: |
        python -m rocket_ai_os --demo-quick 2>&1 | head -100
      continue-on-error: true

  code-quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt flake8

    - name: Lint with flake8
      run: |
        flake8 rocket_ai_os/ test_*.py --max-line-length=120 --count --show-source --statistics
      continue-on-error: true
